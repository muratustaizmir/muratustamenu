<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MURAT USTA</title>

<style>

body{
margin:0;
font-family:Georgia, serif;
color:white;
overflow-x:hidden;
}

/* VIDEO */

.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(1.25) contrast(1.2) saturate(1.3);
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
z-index:-1;
}

/* HEADER */

.header{
text-align:center;
padding:25px 10px 5px 10px;
}

.header h1{
font-size:60px;
letter-spacing:6px;
margin:0;

background:linear-gradient(90deg,#ffcc70,#ff8c00,#ff3c00,#ff0000,#ff8c00,#ffcc70);
background-size:300%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:atesyuru 6s linear infinite;
}

@keyframes atesyuru{
0%{background-position:0%;}
100%{background-position:300%;}
}

.header p{
font-size:22px;
margin-top:8px;
letter-spacing:2px;
}

/* HERO */

.hero{
display:flex;
justify-content:center;
align-items:stretch;
width:100%;
box-sizing:border-box;
padding:0 20px;
gap:30px;
margin-top:10px;
flex-wrap:wrap; /* BURASI KRİTİK */
}

/* PANEL */

.panel{
flex:1;
max-width:340px;
min-width:260px;
height:auto; /* SABİT YÜKSEKLİK KALDIRILDI */

background:rgba(0,0,0,0.45);
backdrop-filter:blur(10px);

border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.8);

padding:18px;

display:flex;
flex-direction:column;
justify-content:center;
}

/* VİZYON */

.vision h2{
text-align:center;
margin-bottom:15px;
letter-spacing:2px;
}

#vizyonYazi{
font-size:15px;
line-height:1.6;
text-align:center;
}

/* RESİM */

.image-panel{
align-items:center;
justify-content:center;
}

.image-panel img{
width:100%;
height:auto;
max-height:320px;
object-fit:cover;
border-radius:10px;
}

/* ORDER PANEL */

.order-panel{
gap:12px;
}

.order-panel a{
display:flex;
align-items:center;
gap:10px;
text-decoration:none;
color:white;
padding:12px;
border-radius:10px;
font-weight:bold;
transition:0.3s;
}

.order-panel img{
width:22px;
}

.phone{background:rgba(255,255,255,0.15);}
.whatsapp{background:rgba(37,211,102,0.45);}
.instagram{background:rgba(225,48,108,0.45);}
.trendyol{background:rgba(255,120,0,0.55);}
.yemeksepeti{background:rgba(255,0,120,0.55);}

.order-panel a:hover{
transform:scale(1.05);
}

/* MENÜ BUTONU */

.menu-btn{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
padding:14px 40px;
font-size:20px;
font-weight:bold;
letter-spacing:2px;
text-decoration:none;
color:white;
border-radius:50px;

background:linear-gradient(90deg,#ffcc00,#ff7b00,#ff0000,#ff7b00,#ffcc00);
background-size:300%;

animation:ates 4s linear infinite,
ziplama 1.5s ease-in-out infinite;

box-shadow:
0 0 15px rgba(255,120,0,0.9),
0 0 40px rgba(255,60,0,0.7),
0 0 70px rgba(255,0,0,0.5);

z-index:1000;
}

.menu-btn:hover{
transform:translateX(-50%) scale(1.08);
}

@keyframes ates{
0%{background-position:0%;}
100%{background-position:300%;}
}

@keyframes ziplama{
0%{bottom:25px;}
50%{bottom:35px;}
100%{bottom:25px;}
}

/* TABLET */

@media (max-width:1000px){
.header h1{font-size:45px;}
.header p{font-size:18px;}
}

/* TELEFON */

@media (max-width:600px){

.header h1{
font-size:30px;
letter-spacing:2px;
}

.header p{
font-size:14px;
}

.hero{
flex-direction:column; /* ALT ALTA */
align-items:center;
gap:20px;
}

.panel{
width:100%;
max-width:95%;
}

.menu-btn{
font-size:16px;
padding:12px 30px;
}

}

</style>
</head>

<body>

<video autoplay muted loop class="video-bg">

</div>

<div class="panel order-panel">

<a class="yemeksepeti" href="https://yemek.go.link/7iaqK">Yemeksepeti</a>

</div>

</div>

</html>
